name: Promote to production

# main is the staging trigger - Netlify auto-deploys luzhanqi-staging on
# every push here. This workflow waits for that deploy to go live, smoke
# tests it, and only then fast-forwards `production` (the prod trigger,
# which the luzhanqi site deploys from) to match - so prod only ever gets a
# commit that staging has already proven out.
on:
  push:
    branches: [main]

env:
  STAGING_SITE_ID: df1fd67b-41bd-429a-a6fd-7be5c05c3812
  STAGING_URL: https://luzhanqi-staging.netlify.app

jobs:
  wait-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for this commit's staging deploy to be ready
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          for i in $(seq 1 60); do
            STATE=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$STAGING_SITE_ID/deploys?per_page=10" \
              | jq -r --arg sha "$SHA" '[.[] | select(.commit_ref == $sha)][0].state // "not-found"')
            echo "Deploy state for $SHA: $STATE"
            if [ "$STATE" = "ready" ]; then
              exit 0
            fi
            if [ "$STATE" = "error" ]; then
              echo "Staging deploy failed."
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for staging deploy to be ready."
          exit 1

      - name: Smoke test staging
        run: |
          code=$(curl -s -o /tmp/staging_body.html -w '%{http_code}' "$STAGING_URL/")
          if [ "$code" != "200" ]; then
            echo "GET / returned $code, expected 200"
            exit 1
          fi
          if ! grep -q 'id="root"' /tmp/staging_body.html; then
            echo "Response body did not contain the expected root element"
            exit 1
          fi
          echo "Staging smoke test passed."

  promote:
    needs: wait-and-smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fast-forward production to this commit
        run: git push origin HEAD:production
